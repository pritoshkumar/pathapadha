<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vocabulary — ଇଂରାଜୀ — ପାଠପଢ଼ା</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+Oriya:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#111;--soft:#555;--light:#888;--bg:#fff;--off:#F7F7F5;--border:#EBEBEB;--c:#FF9F43;--cbg:#FFF5EC;--font:'Nunito',sans-serif;--font-or:'Noto Sans Oriya',serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6;}
a{text-decoration:none;color:inherit;}

nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.93);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-emoji{font-size:1.5rem;}
.logo-text{display:flex;flex-direction:column;line-height:1.2;}
.logo-odia{font-family:var(--font-or);font-size:1.1rem;font-weight:700;}
.logo-url{font-size:0.68rem;font-weight:600;color:var(--light);}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:0.8rem;font-weight:700;color:var(--light);}
.breadcrumb a{color:var(--light);transition:color .15s;}
.breadcrumb a:hover{color:var(--ink);}
.breadcrumb span{color:var(--c);}

.hero{max-width:1100px;margin:0 auto;padding:48px 48px 36px;text-align:center;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--cbg);color:var(--c);font-size:0.78rem;font-weight:800;padding:5px 14px;border-radius:50px;margin-bottom:16px;}
.hero h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;margin-bottom:8px;}
.hero p{font-size:0.95rem;color:var(--soft);max-width:500px;margin:0 auto;}

hr.divider{border:none;border-top:1px solid var(--border);}

.section{max-width:1100px;margin:0 auto;padding:48px 48px 32px;}
.section-title{font-size:1.3rem;font-weight:900;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.section-sub{font-size:0.82rem;color:var(--soft);margin-bottom:24px;}

/* Pair grid for opposites */
.pair-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:40px;}
.pair-card{
  background:#fff;border:2px solid var(--border);border-radius:18px;
  padding:18px 14px;text-align:center;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,border-color .18s;
  cursor:pointer;
}
.pair-card:hover{transform:translateY(-4px);box-shadow:0 6px 20px rgba(0,0,0,0.06);border-color:var(--c);}
.pair-emoji{font-size:2rem;margin-bottom:6px;}
.pair-words{font-size:1.1rem;font-weight:800;color:var(--ink);margin-bottom:4px;}
.pair-arrow{color:var(--c);font-weight:900;}
.pair-odia{font-family:var(--font-or);font-size:0.82rem;color:var(--soft);}

/* Word grid for plurals, verbs, adjectives */
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;margin-bottom:40px;}
.word-card{
  background:#fff;border:2px solid var(--border);border-radius:18px;
  padding:20px 14px 16px;text-align:center;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,border-color .18s;
  cursor:pointer;
}
.word-card:hover{transform:translateY(-5px);box-shadow:0 8px 24px rgba(0,0,0,0.07);border-color:var(--c);}
.word-emoji{font-size:2.5rem;margin-bottom:8px;}
.word-eng{font-size:1.05rem;font-weight:800;color:var(--ink);margin-bottom:2px;}
.word-detail{font-size:0.85rem;font-weight:700;color:var(--c);}
.word-odia{font-family:var(--font-or);font-size:0.85rem;font-weight:700;color:var(--soft);}

.games-cta{text-align:center;padding:32px 20px 16px;}
.games-cta a{display:inline-flex;align-items:center;gap:10px;background:var(--c);color:#fff;font-size:1rem;font-weight:800;padding:14px 32px;border-radius:14px;transition:opacity .15s;}
.games-cta a:hover{opacity:0.85;}

.bottom-nav{max-width:1100px;margin:0 auto;padding:16px 48px 48px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.bottom-nav a{font-size:0.88rem;font-weight:800;color:var(--c);padding:10px 20px;border:2px solid var(--c);border-radius:12px;transition:all .15s;}
.bottom-nav a:hover{background:var(--c);color:#fff;}

footer{border-top:1px solid var(--border);padding:28px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.footer-logo{font-family:var(--font-or);font-size:1rem;font-weight:700;}
.footer-copy{font-size:0.78rem;color:var(--light);font-weight:600;}

@media(max-width:768px){
  nav{padding:14px 20px;}
  .hero{padding:32px 20px 24px;}
  .section{padding:32px 20px 24px;}
  .pair-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .word-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
  .bottom-nav{padding:16px 20px 36px;}
  footer{padding:20px;}
}
</style>
</head>
<body>

<nav>
  <a href="../../index.html" class="logo">
    <div class="logo-emoji">📖</div>
    <div class="logo-text">
      <!-- REVIEW NEEDED -->
      <span class="logo-odia">ପାଠପଢ଼ା</span>
      <span class="logo-url">pathapadha.com</span>
    </div>
  </a>
  <div class="breadcrumb">
    <a href="../../index.html">Home</a> ›
    <a href="../index.html">Class 2</a> ›
    <a href="index.html">English</a> ›
    <span>Vocabulary</span>
  </div>
</nav>

<section class="hero">
  <div class="hero-badge">💬 Vocabulary</div>
  <h1>💬 Vocabulary Builder</h1>
  <!-- REVIEW NEEDED -->
  <p>ବିପରୀତ ଶବ୍ଦ, ବହୁବଚନ, କ୍ରିୟା ଓ ବିଶେଷଣ ଶିଖନ୍ତୁ — Learn opposites, plurals, verbs and adjectives!</p>
</section>

<hr class="divider">

<div id="vocabSections"></div>

<footer>

  <span class="footer-logo">ପାଠପଢ଼ା</span>
  <span class="footer-copy">Class 2 · English · Free forever</span>
</footer>

<script>
var sections = [
  {
    /* REVIEW NEEDED */
    title: '🔄 Opposites — ବିପରୀତ ଶବ୍ଦ',
    sub: '10 pairs of opposite words',
    type: 'pairs',
    items: [
      {a:'Big',b:'Small',oa:'ବଡ଼',ob:'ଛୋଟ',e:'📏'},
      {a:'Hot',b:'Cold',oa:'ଗରମ',ob:'ଥଣ୍ଡା',e:'🌡️'},
      {a:'Happy',b:'Sad',oa:'ଖୁସି',ob:'ଦୁଃଖୀ',e:'😊'},
      {a:'Fast',b:'Slow',oa:'ଦ୍ରୁତ',ob:'ଧୀର',e:'🏃'},
      {a:'Up',b:'Down',oa:'ଉପରେ',ob:'ତଳେ',e:'⬆️'},
      {a:'Day',b:'Night',oa:'ଦିନ',ob:'ରାତି',e:'🌞'},
      {a:'Old',b:'New',oa:'ପୁରୁଣା',ob:'ନୂଆ',e:'📦'},
      {a:'Long',b:'Short',oa:'ଲମ୍ବା',ob:'ଛୋଟ',e:'📐'},
      {a:'Open',b:'Close',oa:'ଖୋଲିବା',ob:'ବନ୍ଦ କରିବା',e:'🚪'},
      {a:'Clean',b:'Dirty',oa:'ସଫା',ob:'ମଇଳା',e:'🧹'}
    ]
  },
  {
    /* REVIEW NEEDED */
    title: '📚 Plurals — ବହୁବଚନ',
    sub: '10 singular to plural words',
    type: 'words',
    items: [
      {w:'Book → Books',o:'ବହି → ବହିଗୁଡ଼ିକ',e:'📚'},
      {w:'Cat → Cats',o:'ବିଲେଇ → ବିଲେଇମାନେ',e:'🐱'},
      {w:'Box → Boxes',o:'ବାକ୍ସ → ବାକ୍ସଗୁଡ଼ିକ',e:'📦'},
      {w:'Mango → Mangoes',o:'ଆମ୍ବ → ଆମ୍ବଗୁଡ଼ିକ',e:'🥭'},
      {w:'Child → Children',o:'ପିଲା → ପିଲାମାନେ',e:'👧'},
      {w:'Leaf → Leaves',o:'ପତ୍ର → ପତ୍ରଗୁଡ଼ିକ',e:'🍃'},
      {w:'Tooth → Teeth',o:'ଦାନ୍ତ → ଦାନ୍ତଗୁଡ଼ିକ',e:'🦷'},
      {w:'Fish → Fish',o:'ମାଛ → ମାଛ',e:'🐟'},
      {w:'Bus → Buses',o:'ବସ୍ → ବସ୍‌ଗୁଡ଼ିକ',e:'🚌'},
      {w:'Baby → Babies',o:'ଛୁଆ → ଛୁଆମାନେ',e:'👶'}
    ]
  },
  {
    /* REVIEW NEEDED */
    title: '🏃 Action Words (Verbs) — କ୍ରିୟାପଦ',
    sub: '10 common action words',
    type: 'words',
    items: [
      {w:'Run',o:'ଦୌଡ଼ିବା',e:'🏃'},
      {w:'Jump',o:'ଡ଼ିଆଁ ମାରିବା',e:'🤸'},
      {w:'Eat',o:'ଖାଇବା',e:'🍽️'},
      {w:'Drink',o:'ପିଇବା',e:'🥤'},
      {w:'Read',o:'ପଢ଼ିବା',e:'📖'},
      {w:'Write',o:'ଲେଖିବା',e:'✏️'},
      {w:'Sing',o:'ଗାଇବା',e:'🎤'},
      {w:'Sleep',o:'ଶୋଇବା',e:'😴'},
      {w:'Play',o:'ଖେଳିବା',e:'⚽'},
      {w:'Swim',o:'ପହଁରିବା',e:'🏊'}
    ]
  },
  {
    /* REVIEW NEEDED */
    title: '🌈 Describing Words (Adjectives) — ବିଶେଷଣ',
    sub: '10 common describing words',
    type: 'words',
    items: [
      {w:'Beautiful',o:'ସୁନ୍ଦର',e:'🌺'},
      {w:'Tall',o:'ଲମ୍ବା',e:'🦒'},
      {w:'Soft',o:'ନରମ',e:'🧸'},
      {w:'Hard',o:'କଠିନ',e:'🪨'},
      {w:'Sweet',o:'ମିଠା',e:'🍬'},
      {w:'Bright',o:'ଉଜ୍ଜ୍ୱଳ',e:'💡'},
      {w:'Round',o:'ଗୋଲ',e:'⚽'},
      {w:'Heavy',o:'ଭାରି',e:'🏋️'},
      {w:'Thin',o:'ପତଳା',e:'📄'},
      {w:'Strong',o:'ବଳିଷ୍ଠ',e:'💪'}
    ]
  }
];

var container = document.getElementById('vocabSections');
sections.forEach(function(cat) {
  var sec = document.createElement('section');
  sec.className = 'section';
  var html = '<div class="section-title">' + cat.title + '</div>' +
    '<div class="section-sub">' + cat.sub + '</div>';

  if (cat.type === 'pairs') {
    html += '<div class="pair-grid">';
    cat.items.forEach(function(p) {
      html += '<div class="pair-card" onclick="speakWord(\'' + p.a + ' and ' + p.b + '\')">' +
        '<div class="pair-emoji">' + p.e + '</div>' +
        '<div class="pair-words">' + p.a + ' <span class="pair-arrow">↔</span> ' + p.b + '</div>' +
        '<!-- REVIEW NEEDED -->' +
        '<div class="pair-odia">' + p.oa + ' ↔ ' + p.ob + '</div>' +
      '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="word-grid">';
    cat.items.forEach(function(w) {
      html += '<div class="word-card" onclick="speakWord(\'' + w.w.split(' →')[0] + '\')">' +
        '<div class="word-emoji">' + w.e + '</div>' +
        '<div class="word-eng">' + w.w + '</div>' +
        '<!-- REVIEW NEEDED -->' +
        '<div class="word-odia">' + w.o + '</div>' +
      '</div>';
    });
    html += '</div>';
  }

  sec.innerHTML = html;
  container.appendChild(sec);
});

function speakWord(word) {
  if ('speechSynthesis' in window) {
    var utt = new SpeechSynthesisUtterance(word);
    utt.lang = 'en-US';
    utt.rate = 0.8;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utt);
  }
}
</script>
</body>
