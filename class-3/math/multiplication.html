var tables=[2,3,4,5,6,7,8,9,10];
var c=document.getElementById('contentContainer');
tables.forEach(function(n,idx){
  var card=document.createElement('div');card.className='card';card.style.animationDelay=(idx*0.05)+'s';
  var rows='';for(var i=1;i<=10;i++){rows+='<div class="table-cell">'+n+' × '+i+' = '+(n*i)+'</div>'}
  card.innerHTML='<div class="card-title">'+n+' ର ଗୁଣନ ସାରଣୀ — Table of '+n+'</div><div class="table-grid"><div class="table-cell header">'+n+' × ?</div>'+rows+'</div>';
  c.appendChild(card);
});
