<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- REVIEW NEEDED -->
<title>Sentences — ଇଂରାଜୀ — ପାଠପଢ଼ା</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+Oriya:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#111;--soft:#555;--light:#888;--bg:#fff;--off:#F7F7F5;--border:#EBEBEB;--c:#3A86FF;--cbg:#EEF4FF;--font:'Nunito',sans-serif;--font-or:'Noto Sans Oriya',serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6;}
a{text-decoration:none;color:inherit;}

nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.93);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-emoji{font-size:1.5rem;}
.logo-text{display:flex;flex-direction:column;line-height:1.2;}
.logo-odia{font-family:var(--font-or);font-size:1.1rem;font-weight:700;}
.logo-url{font-size:0.68rem;font-weight:600;color:var(--light);}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:0.8rem;font-weight:700;color:var(--light);}
.breadcrumb a{color:var(--light);transition:color .15s;}
.breadcrumb a:hover{color:var(--ink);}
.breadcrumb span{color:var(--c);}

.hero{max-width:1100px;margin:0 auto;padding:48px 48px 36px;text-align:center;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--cbg);color:var(--c);font-size:0.78rem;font-weight:800;padding:5px 14px;border-radius:50px;margin-bottom:16px;}
.hero h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;margin-bottom:8px;}
.hero p{font-size:0.95rem;color:var(--soft);max-width:500px;margin:0 auto;}

hr.divider{border:none;border-top:1px solid var(--border);}

.section{max-width:900px;margin:0 auto;padding:48px 48px 32px;}
.section-label{font-size:0.7rem;font-weight:700;color:#bbb;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:28px;text-align:center;}

.sentence-list{display:flex;flex-direction:column;gap:14px;margin-bottom:40px;}
.sentence-card{
  background:#fff;border:2px solid var(--border);border-radius:18px;
  padding:20px 24px;display:flex;align-items:center;gap:16px;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,border-color .18s;
  cursor:pointer;position:relative;overflow:hidden;
}
.sentence-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c);}
.sentence-card:hover{transform:translateX(4px);box-shadow:0 6px 20px rgba(0,0,0,0.06);border-color:var(--c);}
.sentence-emoji{font-size:2rem;flex-shrink:0;}
.sentence-num{font-size:0.65rem;font-weight:800;color:var(--c);letter-spacing:1px;margin-bottom:4px;}
.sentence-eng{font-size:1.1rem;font-weight:800;color:var(--ink);margin-bottom:4px;}
.sentence-odia{font-family:var(--font-or);font-size:0.92rem;font-weight:700;color:var(--soft);}

.games-cta{text-align:center;padding:32px 20px 48px;}
.games-cta a{display:inline-flex;align-items:center;gap:10px;background:var(--c);color:#fff;font-size:1rem;font-weight:800;padding:14px 32px;border-radius:14px;transition:opacity .15s;}
.games-cta a:hover{opacity:0.85;}

footer{border-top:1px solid var(--border);padding:28px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.footer-logo{font-family:var(--font-or);font-size:1rem;font-weight:700;}
.footer-copy{font-size:0.78rem;color:var(--light);font-weight:600;}

@media(max-width:768px){
  nav{padding:14px 20px;}
  .hero{padding:32px 20px 24px;}
  .section{padding:32px 20px 24px;}
  .sentence-card{flex-direction:column;align-items:flex-start;padding-left:20px;}
  footer{padding:20px;}
}
</style>
</head>
<body>

<nav>
  <a href="../../index.html" class="logo">
    <div class="logo-emoji">📖</div>
    <div class="logo-text">
      <!-- REVIEW NEEDED -->
      <span class="logo-odia">ପାଠପଢ଼ା</span>
      <span class="logo-url">pathapadha.com</span>
    </div>
  </a>
  <div class="breadcrumb">
    <a href="../../index.html">Home</a> ›
    <a href="../index.html">Class 1</a> ›
    <a href="index.html">English</a> ›
    <span>Sentences</span>
  </div>
</nav>

<section class="hero">
  <div class="hero-badge">📝 Simple Sentences</div>
  <h1>📝 Simple English Sentences</h1>
  <!-- REVIEW NEEDED -->
  <p>ସରଳ ଇଂରାଜୀ ବାକ୍ୟ ଶିଖନ୍ତୁ — Learn simple English sentences with Odia translations!</p>
</section>

<hr class="divider">

<section class="section">
  <div class="section-label">Read and Learn</div>
  <div class="sentence-list" id="sentenceList"></div>
</section>

<div class="games-cta">
  <a href="sentences-games.html">🎮 Play Sentence Games →</a>
</div>

<footer>
  <!-- REVIEW NEEDED -->
  <span class="footer-logo">ପାଠପଢ଼ା</span>
  <span class="footer-copy">Class 1 · English · Free forever</span>
</footer>

<script>
/* REVIEW NEEDED — all Odia translations below */
var sentences = [
  {eng:'This is a cat.',odia:'ଏହା ଏକ ବିଲେଇ ।',e:'🐱'},
  {eng:'I am happy.',odia:'ମୁଁ ଖୁସି ।',e:'😊'},
  {eng:'The sun is hot.',odia:'ସୂର୍ଯ୍ୟ ଗରମ ।',e:'☀️'},
  {eng:'I can see a bird.',odia:'ମୁଁ ଏକ ପକ୍ଷୀ ଦେଖୁଛି ।',e:'🐦'},
  {eng:'The dog is big.',odia:'କୁକୁରଟି ବଡ଼ ।',e:'🐕'},
  {eng:'I like mango.',odia:'ମୁଁ ଆମ୍ବ ପସନ୍ଦ କରେ ।',e:'🥭'},
  {eng:'She is my mother.',odia:'ସେ ମୋ ମା ।',e:'👩'},
  {eng:'He is my father.',odia:'ସେ ମୋ ବାପା ।',e:'👨'},
  {eng:'The fish is in water.',odia:'ମାଛଟି ପାଣିରେ ଅଛି ।',e:'🐟'},
  {eng:'I go to school.',odia:'ମୁଁ ବିଦ୍ୟାଳୟକୁ ଯାଏ ।',e:'🏫'},
  {eng:'The cow gives milk.',odia:'ଗାଈ କ୍ଷୀର ଦିଏ ।',e:'🐄'},
  {eng:'The ball is red.',odia:'ବଲ୍ ଟି ଲାଲ୍ ।',e:'🔴'},
  {eng:'I have two eyes.',odia:'ମୋର ଦୁଇଟି ଆଖି ଅଛି ।',e:'👀'},
  {eng:'The tree is green.',odia:'ଗଛଟି ସବୁଜ ।',e:'🌳'},
  {eng:'I love my sister.',odia:'ମୁଁ ମୋ ଭଉଣୀକୁ ଭଲ ପାଏ ।',e:'👧'},
  {eng:'This is my hand.',odia:'ଏହା ମୋ ହାତ ।',e:'🤚'},
  {eng:'The sky is blue.',odia:'ଆକାଶ ନୀଳ ।',e:'🔵'},
  {eng:'I drink water.',odia:'ମୁଁ ପାଣି ପିଏ ।',e:'💧'},
  {eng:'The flower is pretty.',odia:'ଫୁଲ ସୁନ୍ଦର ।',e:'🌸'}
];

var list = document.getElementById('sentenceList');
sentences.forEach(function(s, i) {
  var card = document.createElement('div');
  card.className = 'sentence-card';
  card.innerHTML =
    '<div class="sentence-emoji">' + s.e + '</div>' +
    '<div>' +
      '<div class="sentence-num">Sentence ' + (i + 1) + '</div>' +
      '<div class="sentence-eng">' + s.eng + '</div>' +
      '<div class="sentence-odia">' + s.odia + '</div>' +
    '</div>';
  card.addEventListener('click', function() {
    if ('speechSynthesis' in window) {
      var utt = new SpeechSynthesisUtterance(s.eng);
      utt.lang = 'en-US'; utt.rate = 0.75;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utt);
    }
  });
  list.appendChild(card);
});
</script>
</body>
</html>
