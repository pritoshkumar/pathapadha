<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- REVIEW NEEDED -->
<title>ଅଷ୍ଟମ ଶ୍ରେଣୀ — ପାଠପଢ଼ା</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+Oriya:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #111111;
  --soft:   #555555;
  --light:  #888888;
  --bg:     #ffffff;
  --off:    #F7F7F5;
  --border: #EBEBEB;
  --c8:     #3A86FF;
  --c8bg:   #EEF4FF;
  --font:   'Nunito', sans-serif;
  --font-or:'Noto Sans Oriya', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--ink); line-height: 1.6; }
a { text-decoration: none; color: inherit; }

/* NAV */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 48px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.93);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-emoji { font-size: 1.5rem; }
.logo-text { display: flex; flex-direction: column; line-height: 1.2; }
.logo-odia { font-family: var(--font-or); font-size: 1.1rem; font-weight: 700; }
.logo-url  { font-size: 0.68rem; font-weight: 600; color: var(--light); }
.breadcrumb {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.8rem; font-weight: 700; color: var(--light);
}
.breadcrumb a { color: var(--light); transition: color .15s; }
.breadcrumb a:hover { color: var(--ink); }
.breadcrumb span { color: var(--c8); }

/* HERO */
.hero {
  max-width: 1100px; margin: 0 auto;
  padding: 64px 48px 56px;
  display: grid; grid-template-columns: 1fr auto;
  align-items: center; gap: 48px;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--c8bg); color: var(--c8);
  font-size: 0.78rem; font-weight: 800;
  padding: 5px 14px; border-radius: 50px;
  margin-bottom: 16px;
}
.hero h1 {
  font-family: var(--font-or);
  font-size: clamp(2.2rem, 5vw, 3.4rem);
  font-weight: 700; line-height: 1.2;
  color: var(--ink); margin-bottom: 8px;
}
.hero-eng {
  font-size: 1.1rem; font-weight: 800;
  color: var(--light); margin-bottom: 16px;
}
.hero-desc {
  font-size: 0.95rem; color: var(--soft);
  max-width: 400px; line-height: 1.8;
}
.hero-art {
  width: 160px; height: 160px;
  border-radius: 32px;
  background: var(--c8bg);
  display: flex; align-items: center;
  justify-content: center;
  font-size: 5rem;
  flex-shrink: 0;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}

hr.divider { border: none; border-top: 1px solid var(--border); }

/* SECTION */
.section { max-width: 1100px; margin: 0 auto; padding: 56px 48px; }
.section-label {
  font-size: 0.7rem; font-weight: 700;
  color: #bbb; letter-spacing: 2.5px;
  text-transform: uppercase; margin-bottom: 28px;
}

/* SUBJECT GRID */
.subject-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.subject-card {
  border-radius: 24px;
  border: 2px solid var(--border);
  padding: 32px 28px 28px;
  display: flex; flex-direction: column; gap: 14px;
  background: #fff; position: relative; overflow: hidden;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1),
              box-shadow 0.2s, border-color 0.2s;
}
.subject-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 5px;
  background: var(--sc);
}
.subject-card.live { cursor: pointer; }
.subject-card.live:hover {
  transform: translateY(-5px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.1);
  border-color: var(--sc);
}
.subject-card.soon { opacity: 0.45; }

.subj-top { display: flex; align-items: flex-start; justify-content: space-between; }
.subj-emoji { font-size: 2.8rem; line-height: 1; }
.subj-badge {
  font-size: 0.68rem; font-weight: 800;
  padding: 4px 12px; border-radius: 50px;
  background: var(--scbg); color: var(--sc);
  letter-spacing: 0.5px;
}
.subj-name-or {
  font-family: var(--font-or);
  font-size: 1.4rem; font-weight: 700;
  color: var(--ink); line-height: 1.2;
}
.subj-name-en {
  font-size: 0.82rem; font-weight: 700;
  color: var(--light); margin-top: 4px;
}
.subj-book {
  font-size: 0.78rem; font-weight: 700;
  color: var(--soft);
  background: var(--off);
  padding: 6px 12px; border-radius: 8px;
  display: inline-block;
}
.subj-topics {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 4px;
}
.topic-tag {
  font-size: 0.68rem; font-weight: 700;
  padding: 4px 10px; border-radius: 8px;
  background: var(--scbg); color: var(--sc);
  letter-spacing: 0.3px;
}
.topic-tag.off {
  background: var(--off); color: var(--light);
}
.subj-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto; padding-top: 8px;
  border-top: 1px solid var(--border);
}
.subj-go {
  font-size: 0.82rem; font-weight: 800;
  color: var(--sc);
  display: flex; align-items: center; gap: 5px;
  transition: gap .15s;
}
.subject-card.live:hover .subj-go { gap: 10px; }
.subj-soon { font-size: 0.7rem; font-weight: 700; color: #ccc; letter-spacing: 1px; text-transform: uppercase; }
.subj-progress {
  font-size: 0.72rem; font-weight: 700;
  color: var(--sc);
}

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 28px 48px;
  display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.footer-logo { font-family: var(--font-or); font-size: 1rem; font-weight: 700; }
.footer-copy { font-size: 0.78rem; color: var(--light); font-weight: 600; }

/* RESPONSIVE */
@media (max-width: 768px) {
  nav { padding: 14px 20px; }
  .hero { grid-template-columns: 1fr; padding: 40px 20px 32px; gap: 24px; }
  .hero-art { width: 100px; height: 100px; font-size: 3rem; border-radius: 20px; }
  .section { padding: 40px 20px; }
  .subject-grid { grid-template-columns: 1fr; }
  footer { padding: 20px; }
}
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="logo">
    <div class="logo-emoji">📖</div>
    <div class="logo-text">
      <!-- REVIEW NEEDED -->
      <span class="logo-odia">ପାଠପଢ଼ା</span>
      <span class="logo-url">pathapadha.com</span>
    </div>
  </a>
  <div class="breadcrumb">
    <a href="../index.html">Home</a> › <span>Class 8</span>
  </div>
</nav>

<section class="hero">
  <div>
    <div class="hero-badge">🧮 NEP 2020 · BSE Odisha</div>
    <!-- REVIEW NEEDED -->
    <h1>ଅଷ୍ଟମ ଶ୍ରେଣୀ</h1>
    <p class="hero-eng">Class 8 — Middle Stage</p>
    <p class="hero-desc">Pick a subject below to start learning. Each subject follows the official BSE Odisha textbook for Class 8.</p>
  </div>
  <div class="hero-art">🧮</div>
</section>

<hr class="divider">

<section class="section">
  <!-- REVIEW NEEDED -->
  <div class="section-label">ବିଷୟ ବାଛନ୍ତୁ — Choose a Subject</div>
  <div class="subject-grid" id="subjectGrid"></div>
</section>

<footer>
  <!-- REVIEW NEEDED -->
  <span class="footer-logo">ପାଠପଢ଼ା</span>
  <span class="footer-copy">Class 8 · BSE Odisha · Free forever</span>
</footer>

<script>
// REVIEW NEEDED
var subjects = [
  {
    name: 'ଓଡ଼ିଆ',
    eng: 'Odia Language & Literature',
    emoji: '📗',
    color: '#FF6B6B',
    bg: '#FFF0F0',
    book: 'ସାହିତ୍ୟ ମଞ୍ଜରୀ ଓ ବ୍ୟାକରଣ (BSE Class 8)',
    topics: ['ସାହିତ୍ୟ','ବ୍ୟାକରଣ','ରଚନା','ପଦ୍ୟ','ଭାଷା'],
    liveTopics: ['ସାହିତ୍ୟ','ବ୍ୟାକରଣ','ରଚନା','ପଦ୍ୟ','ଭାଷା'],
    href: 'odia/index.html',
    live: true,
    progress: '5 of 5 topics'
  },
  {
    name: 'ଗଣିତ',
    eng: 'Mathematics',
    emoji: '📘',
    color: '#3A86FF',
    bg: '#EEF4FF',
    book: 'ଗଣିତ (BSE Class 8)',
    topics: ['ବୀଜଗଣିତ','ଜ୍ୟାମିତି','ପରିମିତି','ସଂଖ୍ୟା ପଦ୍ଧତି','ତଥ୍ୟ','ବ୍ୟବସାୟ ଗଣିତ'],
    liveTopics: ['ବୀଜଗଣିତ','ଜ୍ୟାମିତି','ପରିମିତି','ସଂଖ୍ୟା ପଦ୍ଧତି','ତଥ୍ୟ','ବ୍ୟବସାୟ ଗଣିତ'],
    href: 'math/index.html',
    live: true,
    progress: '6 of 6 topics'
  },
  {
    name: 'ଇଂରାଜୀ',
    eng: 'English',
    emoji: '📙',
    color: '#43AA8B',
    bg: '#EDFAF4',
    book: 'Honeydew & It So Happened (NCERT Class 8)',
    topics: ['Literature','Grammar','Vocabulary','Writing'],
    liveTopics: ['Literature','Grammar','Vocabulary','Writing'],
    href: 'english/index.html',
    live: true,
    progress: '4 of 4 topics'
  },
  {
    name: 'ବିଜ୍ଞାନ',
    eng: 'Science',
    emoji: '🔬',
    color: '#7B5EA7',
    bg: '#F3EDFF',
    book: 'ବିଜ୍ଞାନ (BSE Class 8)',
    topics: ['କୋଷ','ବଳ ଓ ଚାପ','ରାସାୟନିକ ପ୍ରତିକ୍ରିୟା','ଆଲୋକ','ପ୍ରଜନନ'],
    liveTopics: ['କୋଷ','ବଳ ଓ ଚାପ','ରାସାୟନିକ ପ୍ରତିକ୍ରିୟା','ଆଲୋକ','ପ୍ରଜନନ'],
    href: 'science/index.html',
    live: true,
    progress: '5 of 5 topics'
  },
  {
    name: 'ସମାଜ ଅଧ୍ୟୟନ',
    eng: 'Social Studies',
    emoji: '🌍',
    color: '#F9C74F',
    bg: '#FFFBEC',
    book: 'ସମାଜ ଅଧ୍ୟୟନ (BSE Class 8)',
    topics: ['ଆଧୁନିକ ଭାରତ','ଭୂଗୋଳ','ସମ୍ବିଧାନ','ଅର୍ଥନୀତି','ଓଡ଼ିଶା'],
    liveTopics: ['ଆଧୁନିକ ଭାରତ','ଭୂଗୋଳ','ସମ୍ବିଧାନ','ଅର୍ଥନୀତି','ଓଡ଼ିଶା'],
    href: 'social/index.html',
    live: true,
    progress: '5 of 5 topics'
  }
];

var grid = document.getElementById('subjectGrid');

subjects.forEach(function(s) {
  var el = document.createElement(s.live ? 'a' : 'div');
  if (s.live) el.href = s.href;
  el.className = 'subject-card ' + (s.live ? 'live' : 'soon');
  el.style.setProperty('--sc',   s.color);
  el.style.setProperty('--scbg', s.bg);

  var topicsHTML = s.topics.map(function(t) {
    var on = s.liveTopics.indexOf(t) > -1;
    return '<span class="topic-tag' + (on ? '' : ' off') + '">' + t + '</span>';
  }).join('');

  el.innerHTML =
    '<div class="subj-top">' +
      '<div class="subj-emoji">' + s.emoji + '</div>' +
      '<div class="subj-badge">' + (s.live ? 'Available' : 'Coming Soon') + '</div>' +
    '</div>' +
    '<div>' +
      '<div class="subj-name-or">' + s.name + '</div>' +
      '<div class="subj-name-en">' + s.eng + '</div>' +
    '</div>' +
    '<div class="subj-book">📚 ' + s.book + '</div>' +
    '<div class="subj-topics">' + topicsHTML + '</div>' +
    '<div class="subj-footer">' +
      (s.live
        ? '<span class="subj-go">Start learning →</span><span class="subj-progress">' + s.progress + '</span>'
        : '<span class="subj-soon">Coming Soon</span>') +
    '</div>';

  grid.appendChild(el);
});
</script>
</body>
</html>
