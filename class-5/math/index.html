<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- REVIEW NEEDED -->
<title>ଗଣିତ — Class 5 Math | ପାଠପଢ଼ା</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+Oriya:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#111;--soft:#555;--light:#888;--bg:#fff;--off:#F7F7F5;--border:#EBEBEB;--c:#3A86FF;--cbg:#EEF4FF;--c5:#0096C7;--c5bg:#E8F7FF;--font:'Nunito',sans-serif;--font-or:'Noto Sans Oriya',serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6}a{text-decoration:none;color:inherit}
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.93);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}.logo-emoji{font-size:1.5rem}.logo-text{display:flex;flex-direction:column;line-height:1.2}.logo-odia{font-family:var(--font-or);font-size:1.1rem;font-weight:700}.logo-url{font-size:0.68rem;font-weight:600;color:var(--light)}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:0.8rem;font-weight:700;color:var(--light)}.breadcrumb a{color:var(--light);transition:color .15s}.breadcrumb a:hover{color:var(--ink)}.breadcrumb span{color:var(--c)}
.hero{max-width:900px;margin:0 auto;padding:56px 48px 40px;text-align:center}
.hero-emoji{font-size:3.5rem;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero h1{font-family:var(--font-or);font-size:clamp(2rem,5vw,3rem);font-weight:700;color:var(--c);margin-bottom:6px}
.hero .subtitle{font-size:1.05rem;color:var(--soft);font-weight:600}
.hero .textbook-ref{font-size:0.78rem;color:var(--light);font-weight:600;margin-top:10px;display:inline-block;background:var(--cbg);padding:4px 16px;border-radius:50px;border:1px solid var(--border)}
hr.divider{border:none;border-top:1px solid var(--border);max-width:900px;margin:0 auto}
.section{max-width:900px;margin:0 auto;padding:40px 48px}
.section-label{font-size:0.7rem;font-weight:700;color:#bbb;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:24px}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.topic-card{background:#fff;border:2px solid var(--border);border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:10px;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;text-decoration:none;color:inherit}
.topic-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.08);border-color:var(--c)}
.topic-emoji{font-size:2rem}
.topic-name{font-family:var(--font-or);font-size:1.15rem;font-weight:700}
.topic-eng{font-size:0.8rem;font-weight:600;color:var(--light)}
.topic-actions{display:flex;gap:8px;margin-top:auto;padding-top:8px}
.topic-btn{font-size:0.75rem;font-weight:800;padding:6px 14px;border-radius:8px;display:inline-flex;align-items:center;gap:4px}
.btn-learn{background:var(--cbg);color:var(--c)}
.btn-play{background:#FFFBEC;color:#E6A800}
footer{border-top:1px solid var(--border);padding:24px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-logo{font-family:var(--font-or);font-size:1rem;font-weight:700}.footer-copy{font-size:0.78rem;color:var(--light);font-weight:600}
@media(max-width:768px){nav,.hero,.section,footer{padding-left:20px;padding-right:20px}.topic-grid{grid-template-columns:1fr}}
@media(max-width:480px){.breadcrumb{display:none}}
</style>
</head>
<body>
<nav>
  <a href="../../index.html" class="logo"><div class="logo-emoji">📖</div><div class="logo-text"><!-- REVIEW NEEDED --><span class="logo-odia">ପାଠପଢ଼ା</span><span class="logo-url">pathapadha.com</span></div></a>
  <div class="breadcrumb"><a href="../../index.html">Home</a> › <a href="../index.html">Class 5</a> › <!-- REVIEW NEEDED --><span>ଗଣିତ</span></div>
</nav>
<div class="hero">
  <div class="hero-emoji">📘</div>
  <!-- REVIEW NEEDED -->
  <h1>ଗଣିତ</h1>
  <p class="subtitle">Mathematics — Class 5</p>
  <span class="textbook-ref">📘 ଗଣିତ ପ୍ରଭା ଭାଗ ୫ (SCERT Odisha)</span>
</div>
<hr class="divider">
<section class="section">
  <!-- REVIEW NEEDED -->
  <div class="section-label">ବିଷୟ ବାଛନ୍ତୁ — Choose a Topic</div>
  <div class="topic-grid" id="topicGrid"></div>
</section>
<footer><!-- REVIEW NEEDED --><span class="footer-logo">ପାଠପଢ଼ା</span><span class="footer-copy">Class 5 · ଗଣିତ · Free forever</span></footer>
<script>
// REVIEW NEEDED
var topics=[
  {emoji:'🔢',name:'ସଂଖ୍ୟା ପଦ୍ଧତି',eng:'Number System',learn:'number-system.html',play:'number-system-games.html'},
  {emoji:'🍕',name:'ଭଗ୍ନାଂଶ ଓ ଦଶମିକ',eng:'Fractions & Decimals',learn:'fractions-decimals.html',play:'fractions-decimals-games.html'},
  {emoji:'📐',name:'ଜ୍ୟାମିତି',eng:'Geometry',learn:'geometry.html',play:'geometry-games.html'},
  {emoji:'📏',name:'ପରିମିତି',eng:'Mensuration',learn:'mensuration.html',play:'mensuration-games.html'},
  {emoji:'💯',name:'ଶତକଡ଼ା',eng:'Percentage',learn:'percentage.html',play:'percentage-games.html'},
  {emoji:'📊',name:'ତଥ୍ୟ ବିଶ୍ଳେଷଣ',eng:'Data Handling',learn:'data.html',play:'data-games.html'}
];
var grid=document.getElementById('topicGrid');
topics.forEach(function(t){
  var a=document.createElement('a');a.href=t.learn;a.className='topic-card';
  a.innerHTML='<div class="topic-emoji">'+t.emoji+'</div><div class="topic-name">'+t.name+'</div><div class="topic-eng">'+t.eng+'</div><div class="topic-actions"><span class="topic-btn btn-learn">📖 Learn</span><span class="topic-btn btn-play" onclick="event.preventDefault();event.stopPropagation();location.href=\''+t.play+'\'">🎮 Play</span></div>';
  grid.appendChild(a);
});
</script>
</body>
</html>
