<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+Oriya:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#111;--soft:#555;--light:#888;--bg:#fff;--off:#F7F7F5;--border:#EBEBEB;--c:#43AA8B;--cbg:#EDFAF4;--font:'Nunito',sans-serif;--font-or:'Noto Sans Oriya',serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6}a{text-decoration:none;color:inherit}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 48px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px}.logo-emoji{font-size:1.4rem}.logo-text{display:flex;flex-direction:column;line-height:1.2}.logo-odia{font-family:var(--font-or);font-size:1.05rem;font-weight:700}.logo-url{font-size:0.65rem;font-weight:600;color:var(--light)}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:0.78rem;font-weight:700;color:var(--light)}.breadcrumb a{color:var(--light);transition:color .15s}.breadcrumb a:hover{color:var(--ink)}.breadcrumb span{color:var(--c)}
.page-hero{max-width:900px;margin:0 auto;padding:48px 48px 36px;text-align:center}
.hero-emoji{font-size:3.5rem;display:block;margin-bottom:12px;animation:bounce-slow 2s ease-in-out infinite}
@keyframes bounce-slow{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.page-hero h1{font-size:clamp(2rem,5vw,3rem);font-weight:700;color:var(--c);margin-bottom:6px}
.page-hero .subtitle{font-size:1.05rem;color:var(--soft);font-weight:600}
.page-hero .textbook-ref{font-size:0.78rem;color:var(--light);font-weight:600;margin-top:10px;display:inline-block;background:var(--cbg);padding:4px 16px;border-radius:50px;border:1px solid var(--border)}
hr.divider{border:none;border-top:1px solid var(--border);max-width:900px;margin:0 auto}
.intro{max-width:900px;margin:0 auto;padding:36px 48px;text-align:center}.intro p{font-size:0.95rem;color:var(--soft);max-width:600px;margin:0 auto;line-height:1.8}
.content-section{max-width:900px;margin:0 auto;padding:0 48px 48px}
.card{background:#fff;border-radius:20px;border:2px solid var(--border);padding:28px 24px;margin-bottom:20px;animation:fadeUp .5s ease both}.card:hover{transform:translateY(-4px);border-color:var(--c);box-shadow:0 8px 24px rgba(0,0,0,0.08)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-title{font-size:1.2rem;font-weight:700;color:var(--ink);margin-bottom:8px}
.card-body{font-size:1rem;line-height:2;color:var(--soft);background:var(--off);border-radius:12px;padding:20px;margin-bottom:12px;white-space:pre-line}
.bottom-nav{max-width:900px;margin:0 auto;padding:12px 48px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:12px;font-size:0.9rem;font-weight:800;transition:opacity .15s,transform .15s;border:none;cursor:pointer;font-family:var(--font)}.btn:hover{opacity:0.85;transform:translateY(-2px)}.btn-outline{background:#fff;color:var(--ink);border:2px solid var(--border)}.btn-primary{background:var(--c);color:#fff}.btn-forward{background:var(--ink);color:#fff}
footer{border-top:1px solid var(--border);padding:24px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}.footer-logo{font-family:var(--font-or);font-size:1rem;font-weight:700}.footer-copy{font-size:0.78rem;color:var(--light);font-weight:600}
@media(max-width:768px){nav,.page-hero,.intro,.content-section,.bottom-nav,footer{padding-left:20px;padding-right:20px}.bottom-nav{flex-direction:column;align-items:stretch;text-align:center}.btn{justify-content:center}}
@media(max-width:480px){.breadcrumb{display:none}}
</style>
</head>

<div class="page-hero"><div class="hero-emoji">📚</div><h1>Vocabulary</h1><p class="subtitle">Words, Meanings, Synonyms & Antonyms</p><span class="textbook-ref">📙 Marigold Part 5 (NCERT)</span></div>
<hr class="divider">
<div class="intro"><p>Build your word power! Learn new words, their meanings, opposites, and similar words.</p></div>
<div class="content-section" id="contentContainer"></div>
<hr class="divider">
<div class="bottom-nav"><a href="grammar.html" class="btn btn-outline">← Grammar</a><a href="vocabulary-games.html" class="btn btn-primary">🎮 Games</a><a href="writing.html" class="btn btn-forward">Writing →</a></div>
<footer><!-- REVIEW NEEDED --><span class="footer-logo">ପାଠପଢ଼ା</span><span class="footer-copy">Class 5 · English · Free forever</span></footer>
<script>
var sections=[
  {title:'🔄 Synonyms — Similar Words',body:'Synonyms are words with similar meanings:\n\nhappy — glad, joyful\nsad — unhappy, sorrowful\nbig — large, huge\nsmall — tiny, little\nbeautiful — lovely, pretty\nbrave — courageous, bold\nfast — quick, rapid\nsmart — clever, intelligent'},
  {title:'↔️ Antonyms — Opposite Words',body:'Antonyms are words with opposite meanings:\n\nhappy ↔ sad\nbig ↔ small\nhot ↔ cold\nday ↔ night\nlight ↔ dark\nfast ↔ slow\nold ↔ new / young\nrich ↔ poor\nhard ↔ soft\ntall ↔ short'},
  {title:'🏷️ One Word for Many',body:'Replace a group of words with one word:\n\nA person who teaches → Teacher\nA person who flies a plane → Pilot\nA place where books are kept → Library\nA person who cures the sick → Doctor\nA place where medicines are sold → Pharmacy\nOne who cannot see → Blind\nOne who cannot hear → Deaf'},
  {title:'✏️ Practice',body:'Find the synonym:\n1. begin → start\n2. end → finish\n3. answer → reply\n\nFind the antonym:\n1. love → hate\n2. right → wrong / left\n3. remember → forget\n\nOne word:\n1. A person who sells flowers → Florist\n2. A house made of ice → Igloo\n3. Animals that eat plants → Herbivores'}
];
var c=document.getElementById('contentContainer');
sections.forEach(function(s,i){
  var card=document.createElement('div');card.className='card';card.style.animationDelay=(i*0.1)+'s';
  card.innerHTML='<div class="card-title">'+s.title+'</div><div class="card-body">'+s.body+'</div>';
  c.appendChild(card);
});
</script>
