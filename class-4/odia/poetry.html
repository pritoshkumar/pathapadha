nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.93);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100}.logo{display:flex;align-items:center;gap:10px}.logo-emoji{font-size:1.5rem}.logo-text{display:flex;flex-direction:column;line-height:1.2}.logo-odia{font-family:var(--font-or);font-size:1.1rem;font-weight:700}.logo-url{font-size:.68rem;font-weight:600;color:var(--light)}.breadcrumb{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:700;color:var(--light)}.breadcrumb a{color:var(--light);transition:color .15s}.breadcrumb a:hover{color:var(--ink)}.breadcrumb span{color:var(--c)}

.hero-actions{display:flex;gap:10px;flex-wrap:wrap}.btn-games{display:inline-flex;align-items:center;gap:8px;background:var(--c);color:#fff;padding:10px 22px;border-radius:12px;font-size:.88rem;font-weight:800;transition:opacity .15s}.btn-games:hover{opacity:.85}
hr.divider{border:none;border-top:1px solid var(--border)}.section{max-width:900px;margin:0 auto;padding:48px}.section-label{font-size:.7rem;font-weight:700;color:#bbb;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:28px}
.poem-card{background:#fff;border:2px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;transition:transform .18s,box-shadow .18s,border-color .18s}.poem-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(123,94,167,.1);border-color:var(--c)}
.poem-emoji{font-size:2.5rem;margin-bottom:12px;display:block}.poem-num{font-size:.72rem;font-weight:800;color:var(--c);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}.poem-odia{font-family:var(--font-or);font-size:1.3rem;font-weight:700;margin-bottom:4px}.poem-eng{font-size:.82rem;font-weight:700;color:var(--light);margin-bottom:14px}
.poem-body{font-family:var(--font-or);font-size:1rem;line-height:2.2;color:var(--soft);background:var(--cbg);border-radius:12px;padding:20px;margin-bottom:14px;white-space:pre-line}

.poem-questions{margin-top:14px}.poem-questions h4{font-size:.8rem;font-weight:800;color:var(--light);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}.poem-questions ol{font-family:var(--font-or);font-size:.9rem;color:var(--soft);padding-left:20px;line-height:2}

footer{border-top:1px solid var(--border);padding:28px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}.footer-logo{font-family:var(--font-or);font-size:1rem;font-weight:700}.footer-copy{font-size:.78rem;color:var(--light);font-weight:600}

<script>

var poems = [
  {emoji:'🌅',odia:'ଆମ ଦେଶ',eng:'Our Country',
   body:'ଆମ ଦେଶ ଭାରତ ଦେଶ,\nସୁନ୍ଦର ଏହାର ବେଶ।\nପର୍ବତ ନଦୀ ସମୁଦ୍ର ଅଛି,\nଫୁଲ ଫଳ ଫସଲ ଅଛି।\nଏଠି ବସେ ସବୁ ଜାତି,\nଏକ ସୂତ୍ରରେ ଗଁଥା ସାଥି।',
   meaning:'ଏହି ପଦ୍ୟରେ ଆମ ଭାରତ ଦେଶର ସୌନ୍ଦର୍ଯ୍ୟ ବର୍ଣ୍ଣନା କରାଯାଇଛି। ଦେଶର ପ୍ରାକୃତିକ ସମ୍ପଦ ଓ ଏକତା ବିଷୟରେ କୁହାଯାଇଛି।',
   questions:['ଆମ ଦେଶର ନାମ କଣ?','ଦେଶରେ କଣ କଣ ଅଛି?','ସବୁ ଜାତି କିପରି ରହନ୍ତି?']},
  {emoji:'🌳',odia:'ଗଛ ଆମର ବନ୍ଧୁ',eng:'Trees Are Our Friends',
   body:'ଗଛ ଆମର ବନ୍ଧୁ ସାଥି,\nଛାଇ ଦିଏ ସବୁ ବାଟି।\nଫଳ ଫୁଲ ଦିଏ ବହୁତ,\nସ୍ୱଚ୍ଛ ହୁଏ ଆମ ବାୟୁ।\nଗଛ ଲଗାଅ ଗଛ ବଢ଼ାଅ,\nପୃଥିବୀକୁ ସବୁଜ କରାଅ।',
   meaning:'ଗଛ ଆମ ପାଇଁ ବହୁତ ଉପକାରୀ। ସେ ଆମକୁ ଛାଇ, ଫଳ, ଫୁଲ ଓ ସ୍ୱଚ୍ଛ ବାୟୁ ଦିଏ। ଆମେ ଗଛ ଲଗାଇବା ଦରକାର।',
   questions:['ଗଛ ଆମକୁ କଣ ଦିଏ?','ଗଛ ବାୟୁ ପାଇଁ କଣ କରେ?','ଆମେ କଣ କରିବା ଉଚିତ?']},
  {emoji:'📚',odia:'ବିଦ୍ୟା',eng:'Education',
   body:'ବିଦ୍ୟା ଧନ ସବୁଠୁ ବଡ଼,\nଚୋର ନେଇ ପାରିବ ନାହିଁ ସଡ଼।\nଯିଏ ପଢ଼େ ସିଏ ବଢ଼େ,\nଜ୍ଞାନର ଆଲୁଅ ସବୁ ଫଡ଼େ।\nପଢ଼ ପଢ଼ ଶିଖ ଶିଖ,\nଜୀବନ ହେବ ସୁଖ ସୁଖ।',
   meaning:'ବିଦ୍ୟା ସବୁଠୁ ବଡ଼ ଧନ ଯାହାକୁ ଚୋରି କରିହୁଏ ନାହିଁ। ପଢ଼ିଲେ ମଣିଷ ଜୀବନରେ ଆଗେଇ ଯାଏ।',
   questions:['ସବୁଠୁ ବଡ଼ ଧନ କଣ?','ବିଦ୍ୟାକୁ ଚୋରି କରିହୁଏ କି?','ପଢ଼ିଲେ ଜୀବନ କିପରି ହୁଏ?']},
  {emoji:'🌸',odia:'ଫୁଲ',eng:'Flowers',
   body:'ଲାଲ ନୀଳ ହଳଦିଆ,\nଫୁଲ ଫୁଟେ ବାଡ଼ିରେ ଅ।\nସୁଗନ୍ଧ ସେ ବିଲାଏ,\nମଧୁ ଖୋଜି ଭ୍ରମର ଆସେ।\nଫୁଲ ଦେଖି ମନ ହସେ,\nପ୍ରକୃତି ସୌନ୍ଦର୍ଯ୍ୟ ଚାରିପାଖେ ବସେ।',
   meaning:'ବିଭିନ୍ନ ରଙ୍ଗର ଫୁଲ ବାଡ଼ିରେ ଫୁଟେ। ସେଗୁଡ଼ିକ ସୁନ୍ଦର ଓ ସୁଗନ୍ଧିତ। ଫୁଲ ପ୍ରକୃତିର ସୌନ୍ଦର୍ଯ୍ୟ।',
   questions:['ଫୁଲ କେଉଁ ରଙ୍ଗର ହୁଏ?','ଭ୍ରମର କାହିଁକି ଆସେ?','ଫୁଲ ଦେଖିଲେ କଣ ହୁଏ?']}
];
var grid=document.getElementById('poemGrid');
poems.forEach(function(p,i){
  var qHTML='';p.questions.forEach(function(q){qHTML+='<li>'+q+'</li>'});
  var card=document.createElement('div');card.className='poem-card';
  card.innerHTML='<span class="poem-emoji">'+p.emoji+'</span><div class="poem-num">Poem '+(i+1)+'</div><!-- REVIEW NEEDED --><div class="poem-odia">'+p.odia+'</div><div class="poem-eng">'+p.eng+'</div><!-- REVIEW NEEDED --><div class="poem-body">'+p.body+'</div><!-- REVIEW NEEDED --><div class="poem-meaning"><strong>ଅର୍ଥ:</strong> '+p.meaning+'</div><div class="poem-questions"><h4>ପ୍ରଶ୍ନ — Questions</h4><ol>'+qHTML+'</ol></div>';
  grid.appendChild(card);
});
</script>
