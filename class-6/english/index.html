:root{--ink:#111;--soft:#555;--light:#888;--bg:#fff;--off:#F7F7F5;--border:#EBEBEB;--c:#43AA8B;--cbg:#EDFAF4;--font:'Nunito',sans-serif;--font-or:'Noto Sans Oriya',serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6}a{text-decoration:none;color:inherit}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 48px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);position:sticky;top:0;z-index:200}.logo{display:flex;align-items:center;gap:10px}.logo-emoji{font-size:1.4rem}.logo-text{display:flex;flex-direction:column;line-height:1.2}.logo-odia{font-family:var(--font-or);font-size:1.05rem;font-weight:700}.logo-url{font-size:0.65rem;font-weight:600;color:var(--light)}.breadcrumb{display:flex;align-items:center;gap:6px;font-size:0.78rem;font-weight:700;color:var(--light)}.breadcrumb a{color:var(--light);transition:color .15s}.breadcrumb a:hover{color:var(--ink)}.breadcrumb span{color:var(--c)}
.page-hero{max-width:900px;margin:0 auto;padding:48px 48px 36px;text-align:center}.hero-emoji{font-size:3.5rem;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}.page-hero h1{font-family:var(--font-or);font-size:clamp(2rem,5vw,3rem);font-weight:700;color:var(--c);margin-bottom:6px}.page-hero .subtitle{font-size:1.05rem;color:var(--soft);font-weight:600}.page-hero .textbook-ref{font-size:0.78rem;color:var(--light);font-weight:600;margin-top:10px;display:inline-block;background:var(--cbg);padding:4px 16px;border-radius:50px;border:1px solid var(--border)}
hr.divider{border:none;border-top:1px solid var(--border);max-width:900px;margin:0 auto}.section{max-width:900px;margin:0 auto;padding:48px}.section-label{font-size:0.7rem;font-weight:700;color:#bbb;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:28px}.topic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.topic-card{display:flex;align-items:center;gap:16px;padding:20px 24px;border-radius:16px;border:2px solid var(--border);background:#fff;transition:all .2s;cursor:pointer}.topic-card:hover{border-color:var(--c);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.08)}.tc-emoji{font-size:2rem;flex-shrink:0}.tc-name{font-family:var(--font-or);font-size:1.1rem;font-weight:700}.tc-eng{font-size:0.78rem;font-weight:600;color:var(--light);margin-top:2px}.tc-arrow{margin-left:auto;font-size:1.2rem;color:var(--light);transition:transform .15s}.topic-card:hover .tc-arrow{transform:translateX(4px);color:var(--c)}
footer{border-top:1px solid var(--border);padding:24px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}.footer-logo{font-family:var(--font-or);font-size:1rem;font-weight:700}.footer-copy{font-size:0.78rem;color:var(--light);font-weight:600}
@media(max-width:768px){nav,.page-hero,.section,footer{padding-left:20px;padding-right:20px}.topic-grid{grid-template-columns:1fr}}@media(max-width:480px){.breadcrumb{display:none}}
</style>
